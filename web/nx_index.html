<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HiSLM — Hybrid NX/AGX</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.3/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #212121;
    --bg2:       #171717;
    --bg3:       #2f2f2f;
    --bubble:    #2f2f2f;
    --user-bub:  #2b5278;
    --border:    #424242;
    --text:      #ececec;
    --text-dim:  #b4b4b4;
    --text-muted:#8e8e8e;
    --accent:    #10a37f;
    --accent2:   #19c99b;
    --warn:      #f44336;
    --agx-col:   #19c99b;
    --nx-col:    #6ab3ff;
    --font:      system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --r:         8px;
    --shadow:    0 1px 3px rgba(0,0,0,.3);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    overflow: hidden;
    line-height: 1.6;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Header ───────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .header-left h1 span { color: var(--accent); }
  .header-left .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 4px;
  }
  .status-chips {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text-dim);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .chip.online  { border-color: var(--accent2); color: var(--accent2); }
  .chip.offline { border-color: var(--warn);    color: var(--warn);    }
  .chip.chip-warn { border-color: #e8b84b; color: #e8b84b; }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 2px;
  }

  /* ── Messages ──────────────────────────────────── */
  #messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    scroll-behavior: smooth;
  }
  #messages-wrap::-webkit-scrollbar { width: 6px; }
  #messages-wrap::-webkit-scrollbar-track { background: transparent; }
  #messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #messages {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    user-select: none;
  }
  #empty-state .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: .4;
  }
  #empty-state p { font-size: 13px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .msg-row.from-user  { align-self: flex-end; }
  .msg-row.from-nx,
  .msg-row.from-agx   { align-self: flex-start; }

  .msg-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 2px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .msg-meta .sender {
    font-weight: 600;
  }
  .from-user .msg-meta { justify-content: flex-end; }
  .from-user .msg-meta .sender { color: var(--user-bub); }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: var(--r);
    line-height: 1.65;
    font-size: 14px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .from-user .msg-bubble {
    background: var(--user-bub);
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .from-nx .msg-bubble,
  .from-agx .msg-bubble {
    background: var(--bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .from-nx .msg-bubble  { border-left: 2px solid var(--nx-col); }
  .from-agx .msg-bubble { border-left: 2px solid var(--agx-col); }
  .from-system .msg-bubble {
    background: none;
    border: none;
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px;
    text-align: center;
  }

  .thinking-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 50px;
  }
  .thinking-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: throb 1.2s ease-in-out infinite;
  }
  .thinking-dot:nth-child(2) { animation-delay: .15s; }
  .thinking-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes throb { 0%,100%{opacity:.3;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }

  .route-reason {
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 4px 0 4px;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .msg-row:hover .route-reason { opacity: .6; }

  /* ── Markdown within bubbles ──────────────────── */
  .msg-bubble p  { margin: 0 0 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 20px; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3,
  .msg-bubble h4 { margin: 10px 0 4px; line-height: 1.3; }
  .msg-bubble h1 { font-size: 16px; }
  .msg-bubble h2 { font-size: 15px; }
  .msg-bubble h3 { font-size: 14px; }
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: rgba(0,0,0,.3);
    padding: 1px 4px;
    border-radius: 3px;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,.4);
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }
  .msg-bubble pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg-bubble blockquote {
    border-left: 3px solid var(--border);
    padding-left: 10px;
    margin: 6px 0;
    color: var(--text-dim);
  }
  .msg-bubble table {
    border-collapse: collapse;
    margin: 6px 0;
    font-size: 13px;
  }
  .msg-bubble th, .msg-bubble td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: left;
  }
  .msg-bubble th { background: rgba(255,255,255,.05); }
  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .msg-bubble a { color: var(--accent2); text-decoration: underline; }

  /* ── Input ─────────────────────────────────────── */
  #input-bar {
    padding: 12px 20px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #input-wrap {
    display: flex;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    align-items: flex-end;
  }
  #input-wrap:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 1px rgba(16,163,127,.2);
  }
  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    padding: 8px 12px;
    resize: none;
    max-height: 120px;
  }
  #msg-input::placeholder { color: var(--text-muted); }
  #send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: currentColor; }

  #reconnect-bar {
    display: none;
    background: rgba(244,67,54,.12);
    border: 1px solid rgba(244,67,54,.3);
    border-radius: 8px;
    padding: 6px 12px;
    margin-bottom: 8px;
    font-size: 12px;
    color: #f44336;
    text-align: center;
    cursor: pointer;
  }
  #reconnect-bar:hover { background: rgba(244,67,54,.2); }

  .conn-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    place-items: center;
  }
  .conn-overlay.show { display: grid; }
  .conn-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    max-width: 360px;
  }
  .conn-card h2 { font-size: 18px; margin-bottom: 8px; }
  .conn-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
  .conn-card button {
    padding: 8px 24px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  .conn-card button:hover { background: var(--accent2); }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    #app { max-width: 100%; }
    .msg-row { max-width: 92%; }
    .status-chips .chip:not(#ws-chip):not(#cache-chip) { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <h1><span>Hi</span>SLM <span class="sub">NX/AGX</span></h1>
    </div>
    <div class="status-chips">
      <div class="chip" id="ws-chip"><span class="dot"></span><span id="ws-label">WS</span></div>
      <div class="chip" id="cache-chip"><span id="cache-label">cache: 0</span></div>
      <div class="chip" id="ctx-chip"><span id="ctx-label">ctx: 0</span></div>
      <div class="chip" id="recall-chip" style="display:none"><span id="recall-label">R:-</span></div>
      <div class="chip" id="acc-chip" style="display:none"><span id="acc-label">A:-</span></div>
    </div>
  </header>

  <div id="messages-wrap">
    <div id="messages">
      <div id="empty-state">
        <div class="icon">✦</div>
        <p>Ask HiSLM anything — medical or general.</p>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div id="reconnect-bar">Connection lost — click to reconnect</div>
    <div id="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Ask anything…"></textarea>
      <button id="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="conn-overlay" id="conn-overlay">
    <div class="conn-card">
      <div class="spinner"></div>
      <h2>Connecting</h2>
      <p id="conn-message">Establishing WebSocket connection to subserver…</p>
      <button id="retry-btn" style="display:none">Retry</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const CONFIDENCE_THRESHOLD = 0.7;

// ── DOM refs ────────────────────────────────────────────────────────
const messagesDiv = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const wsChip = document.getElementById('ws-chip');
const wsLabel = document.getElementById('ws-label');
const cacheLabel = document.getElementById('cache-label');
const ctxLabel = document.getElementById('ctx-label');
const recallChip = document.getElementById('recall-chip');
const recallLabel = document.getElementById('recall-label');
const accChip = document.getElementById('acc-chip');
const accLabel = document.getElementById('acc-label');
const reconnBar = document.getElementById('reconnect-bar');
const connOverlay = document.getElementById('conn-overlay');
const connMessage = document.getElementById('conn-message');
const retryBtn = document.getElementById('retry-btn');

// ── Session ─────────────────────────────────────────────────────────
function getSessionId() {
  let sid = localStorage.getItem('hislm_session_id');
  if (!sid) {
    sid = 'web-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
    localStorage.setItem('hislm_session_id', sid);
  }
  return sid;
}
const sessionId = getSessionId();
let exchangeCount = 0;

// ── WS ──────────────────────────────────────────────────────────────
let ws = null;
let isConnected = false;
let responseBuf = '';
let responseSource = '';
let responseChunks = 0;
let thinkingRow = null;
let pendingSince = null;

function connectWs() {
  if (ws) { ws.close(); ws = null; }
  connOverlay.classList.add('show');
  connMessage.textContent = 'Connecting to subserver…';
  retryBtn.style.display = 'none';

  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + window.location.host + '/ws';
  ws = new WebSocket(url);

  ws.onopen = () => {
    isConnected = true;
    connOverlay.classList.remove('show');
    reconnBar.style.display = 'none';
    wsChip.className = 'chip online';
    wsLabel.textContent = 'WS ✓';
    sendBtn.disabled = false;
    refreshStatus();
  };

  ws.onclose = () => {
    isConnected = false;
    wsChip.className = 'chip offline';
    wsLabel.textContent = 'WS ✗';
    sendBtn.disabled = true;
    reconnBar.style.display = 'block';
  };

  ws.onerror = () => { ws.close(); };

  ws.onmessage = (e) => {
    try {
      const frame = JSON.parse(e.data);
      handleFrame(frame);
    } catch(err) {
      console.error('WS parse err', err);
    }
  };
}

function handleFrame(frame) {
  const t = frame.type;

  if (t === 'pong') return;

  if (t === 'chunk') {
    responseBuf += frame.content || '';
    responseSource = frame.source || responseSource;
    responseChunks++;
    renderStreamingBubble(responseBuf, responseSource);
    scrollToBottom();
    return;
  }

  if (t === 'done') {
    const src = frame.source || responseSource;
    const cnt = frame.content || responseBuf;
    responseBuf = '';
    responseSource = '';
    responseChunks = 0;
    removeThinking();
    renderDoneBubble(cnt, src, frame);
    scrollToBottom();
    refreshStatus();
    exchangeCount++;
    if (ctxLabel) ctxLabel.textContent = `ctx: ${exchangeCount}`;
    return;
  }

  if (t === 'error') {
    console.error('SERVER ERR', frame.message || frame);
    removeThinking();
    const row = document.createElement('div');
    row.className = 'msg-row from-system';
    row.innerHTML = `<div class="msg-bubble">⚠ Error: ${escHtml(frame.message || 'Unknown error')}</div>`;
    messagesDiv.appendChild(row);
    scrollToBottom();
  }
}

// ── Render ──────────────────────────────────────────────────────────
function renderStreamingBubble(content, source) {
  removeThinking();
  let row = document.getElementById('streaming-row');
  const isNx = source === 'NX';
  if (!row) {
    row = document.createElement('div');
    row.id = 'streaming-row';
    row.className = 'msg-row ' + (isNx ? 'from-nx' : 'from-agx');
    row.innerHTML = `
      <div class="msg-meta"><span class="sender" style="color:${isNx ? 'var(--nx-col)' : 'var(--agx-col)'}">${isNx ? 'NX' : 'AGX'}</span></div>
      <div class="msg-bubble"></div>
    `;
    messagesDiv.appendChild(row);
  } else {
    row.className = 'msg-row ' + (isNx ? 'from-nx' : 'from-agx');
  }
  const bubble = row.querySelector('.msg-bubble');
  if (bubble) bubble.innerHTML = marked.parse(content);
}

function renderDoneBubble(content, source, frame) {
  const existing = document.getElementById('streaming-row');
  if (existing) existing.remove();
  if (emptyState && emptyState.parentNode) emptyState.remove();

  const row = document.createElement('div');
  const isNx = source === 'NX';
  const isAgx = source === 'AGX';
  row.className = 'msg-row';
  if (isNx) row.classList.add('from-nx');
  else if (isAgx) row.classList.add('from-agx');
  else row.classList.add('from-system');

  const col = isNx ? 'var(--nx-col)' : (isAgx ? 'var(--agx-col)' : 'inherit');
  const label = isNx ? 'NX' : (isAgx ? 'AGX' : 'System');

  let metaParts = [];
  if (frame.cached) metaParts.push('cached');
  if (frame.confidence != null) metaParts.push('c=' + frame.confidence);
  if (frame.kmeans_label) metaParts.push(frame.kmeans_label);
  if (frame.timing_ms && frame.timing_ms.total_ms) metaParts.push((frame.timing_ms.total_ms/1000).toFixed(1) + 's');
  const metaStr = metaParts.length ? ' · ' + metaParts.join(' ') : '';

  let reasonHtml = '';
  if (frame.route_reason) {
    reasonHtml = `<div class="route-reason">↳ ${escHtml(frame.route_reason)}</div>`;
  }

  row.innerHTML = `
    <div class="msg-meta"><span class="sender" style="color:${col}">${label}</span><span>${metaStr}</span></div>
    <div class="msg-bubble">${marked.parse(content)}</div>
    ${reasonHtml}
  `;
  messagesDiv.appendChild(row);
}

function scrollToBottom() {
  const wrap = document.getElementById('messages-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
  thinkingRow = null;
  pendingSince = null;
}

function showThinking() {
  removeThinking();
  const sr = document.getElementById('streaming-row');
  if (sr) sr.remove();

  thinkingRow = document.createElement('div');
  thinkingRow.className = 'msg-row from-nx';
  thinkingRow.id = 'thinking-indicator';
  pendingSince = Date.now();
  thinkingRow.innerHTML = `
    <div class="msg-meta"><span class="sender" style="color:var(--nx-col)">NX</span></div>
    <div class="msg-bubble">
      <div class="thinking-bubble">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
    </div>
  `;
  messagesDiv.appendChild(thinkingRow);
  scrollToBottom();
}

// ── Send ────────────────────────────────────────────────────────────
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (emptyState && emptyState.parentNode) emptyState.remove();

  // User bubble
  const row = document.createElement('div');
  row.className = 'msg-row from-user';
  row.innerHTML = `
    <div class="msg-meta"><span class="sender">You</span></div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  messagesDiv.appendChild(row);
  scrollToBottom();

  responseBuf = '';
  responseSource = '';
  responseChunks = 0;
  showThinking();

  ws.send(JSON.stringify({ type: 'message', content: text, session_id: sessionId }));

  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;  // re-enabled on next ws:open or done
}

// ── Status ──────────────────────────────────────────────────────────
async function refreshStatus() {
  try {
    const r = await fetch('/cache');
    const d = await r.json();
    if (cacheLabel) cacheLabel.textContent = `cache: ${Math.min(d.total_cached, d.retrain_threshold)}/${d.retrain_threshold}`;
  } catch(e) {}
  try {
    const r = await fetch('/performance');
    const p = await r.json();
    if (recallLabel && p.window > 0) {
      recallLabel.textContent = `R:${(p.recall*100).toFixed(0)}%`;
      recallChip.style.display = '';
      recallChip.className = 'chip' + (p.recall < p.recall_threshold ? ' chip-warn' : '');
    }
    if (accLabel && p.window > 0) {
      accLabel.textContent = `A:${(p.accuracy*100).toFixed(0)}%`;
      accChip.style.display = '';
      accChip.className = 'chip' + (p.accuracy < p.accuracy_threshold ? ' chip-warn' : '');
    }
  } catch(e) {}
}

// ── Helpers ─────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Events ──────────────────────────────────────────────────────────
sendBtn.addEventListener('click', sendMessage);

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

reconnBar.addEventListener('click', connectWs);
retryBtn.addEventListener('click', connectWs);

// ── Init ────────────────────────────────────────────────────────────
connectWs();
refreshStatus();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>
