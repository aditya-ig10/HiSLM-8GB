<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Orin NX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── Tokens ─────────────────────────────────────────────────────── */
:root {
  --bg:       #0C0C0C;
  --s1:       #161616;
  --s2:       #1F1F1F;
  --s3:       #2A2A2A;
  --b1:       rgba(255,255,255,0.06);
  --b2:       rgba(255,255,255,0.10);
  --t1:       #E4E4E7;
  --t2:       #52525B;
  --t3:       #3F3F46;
  --ac:       #34D399;
  --ac0:      rgba(52,211,153,0.07);
  --ubg:      #1A1A1A;
  --ut:       #D4D4D8;
  --e:        cubic-bezier(.4,0,.2,1);
  --es:       cubic-bezier(.34,1.4,.64,1);
  --ff:       'Manrope', sans-serif;
  --fm:       'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg:   #FAFAFA;
  --s1:   #F2F2F2;
  --s2:   #EAEAEA;
  --s3:   #E0E0E0;
  --b1:   rgba(0,0,0,0.06);
  --b2:   rgba(0,0,0,0.10);
  --t1:   #18181B;
  --t2:   #71717A;
  --t3:   #A1A1AA;
  --ac:   #059669;
  --ac0:  rgba(5,150,105,0.07);
  --ubg:  #E8E8EB;
  --ut:   #27272A;
}

/* ── Reset ──────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { -webkit-text-size-adjust:100% }
body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--t1);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background .18s var(--e), color .18s var(--e);
}

/* ── Shell ──────────────────────────────────────────────────────── */
#shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
}

/* ── Header ─────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  padding: 0 20px;
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
  gap: 12px;
}

.h-name {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .16em;
  color: var(--t1);
  font-family: var(--fm);
  white-space: nowrap;
}

.h-status {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--ac);
  flex-shrink: 0;
  animation: blink 2.8s ease-in-out infinite;
}
.dot.off  { background: #EF4444; animation: none }
.dot.wait { background: #F59E0B; animation: blink .8s ease-in-out infinite }

@keyframes blink {
  0%,100% { opacity:1 }
  50%      { opacity:.3 }
}

.h-status-text {
  font-size: 10.5px;
  font-family: var(--fm);
  color: var(--t3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.h-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}

.ib {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--t3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color .15s var(--e), background .15s var(--e);
}
.ib:hover  { color: var(--t1); background: var(--s2) }
.ib:active { background: var(--s3) }
.ib svg { width: 15px; height: 15px; pointer-events: none }

/* ── Messages ───────────────────────────────────────────────────── */
#msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 28px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}
#msgs::-webkit-scrollbar { width: 2px }
#msgs::-webkit-scrollbar-track { background: transparent }
#msgs::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px }

/* ── Welcome ────────────────────────────────────────────────────── */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 0 0 32px;
  gap: 12px;
  animation: up .45s var(--e) both;
}

@keyframes up {
  from { opacity:0; transform:translateY(12px) }
  to   { opacity:1; transform:none }
}

.w-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--t1);
  line-height: 1.2;
}

.w-sub {
  font-size: 13px;
  color: var(--t2);
  line-height: 1.6;
  max-width: 340px;
  font-weight: 400;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.chip {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--b2);
  background: transparent;
  font-size: 12px;
  font-family: var(--ff);
  color: var(--t2);
  cursor: pointer;
  transition: all .15s var(--e);
  white-space: nowrap;
}
.chip:hover  { border-color: var(--ac); color: var(--ac); background: var(--ac0) }
.chip:active { opacity: .75 }

/* ── Message rows ───────────────────────────────────────────────── */
.msg {
  max-width: 100%;
  animation: msg-in .22s var(--e) both;
}

@keyframes msg-in {
  from { opacity:0; transform:translateY(8px) }
  to   { opacity:1; transform:none }
}

/* AI message */
.msg.ai {
  padding: 14px 0;
  border-bottom: 1px solid var(--b1);
  display: grid;
  grid-template-columns: 28px 1fr;
  grid-template-rows: auto auto;
  column-gap: 12px;
}

.msg-tag {
  font-size: 9.5px;
  font-family: var(--fm);
  font-weight: 500;
  color: var(--ac);
  letter-spacing: .06em;
  padding-top: 2px;
  opacity: .7;
  white-space: nowrap;
}

.msg-body {
  font-size: 14.5px;
  line-height: 1.72;
  color: var(--t1);
  font-weight: 400;
  min-width: 0;
}

.msg-time {
  font-size: 10px;
  font-family: var(--fm);
  color: var(--t3);
  margin-top: 6px;
  opacity: 0;
  transition: opacity .15s var(--e);
  grid-column: 2;
}
.msg:hover .msg-time { opacity: 1 }

/* User message */
.msg.user {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 10px 0;
}

.user-bubble {
  background: var(--ubg);
  color: var(--ut);
  padding: 10px 15px;
  border-radius: 16px 16px 3px 16px;
  font-size: 14.5px;
  line-height: 1.65;
  max-width: 82%;
  word-break: break-word;
  font-weight: 400;
}

/* Markdown */
.msg-body p, .user-bubble p { margin-bottom: 8px }
.msg-body p:last-child, .user-bubble p:last-child { margin-bottom: 0 }
.msg-body ul,.msg-body ol { padding-left: 18px; margin: 6px 0 }
.msg-body li { margin-bottom: 3px }
.msg-body strong,.user-bubble strong { font-weight: 600 }
.msg-body pre {
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 8px;
  padding: 11px 14px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: var(--fm);
  font-size: 12px;
  line-height: 1.6;
}
.msg-body code, .user-bubble code {
  font-family: var(--fm);
  font-size: 12.5px;
  background: var(--s2);
  padding: 1px 5px;
  border-radius: 4px;
}
.msg-body pre code { background: none; padding: 0 }

/* ── Typing ─────────────────────────────────────────────────────── */
#typing-row {
  padding: 14px 0;
  border-bottom: 1px solid var(--b1);
  display: grid;
  grid-template-columns: 28px 1fr;
  column-gap: 12px;
  align-items: center;
  animation: msg-in .2s var(--e) both;
}

.t-tag {
  font-size: 9.5px;
  font-family: var(--fm);
  color: var(--ac);
  letter-spacing: .06em;
  opacity: .7;
}

.t-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  height: 20px;
}

.t-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--t3);
  animation: tdot 1.1s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay:.14s }
.t-dot:nth-child(3) { animation-delay:.28s }

@keyframes tdot {
  0%,60%,100% { transform:translateY(0); opacity:.4 }
  30%          { transform:translateY(-4px); opacity:1 }
}

/* ── Input ──────────────────────────────────────────────────────── */
#inp-wrap {
  flex-shrink: 0;
  padding: 12px 20px env(safe-area-inset-bottom, 16px);
  border-top: 1px solid var(--b1);
}

.inp-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--ff);
  font-size: 14.5px;
  color: var(--t1);
  resize: none;
  min-height: 24px;
  max-height: 140px;
  overflow-y: auto;
  line-height: 1.6;
  padding: 2px 0;
  caret-color: var(--ac);
}
#inp::placeholder { color: var(--t3) }
#inp::-webkit-scrollbar { width: 2px }
#inp::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px }

#send {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--ac);
  border: none;
  color: #052e1a;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform .15s var(--es), opacity .15s var(--e);
  margin-bottom: 1px;
}
#send:hover:not(:disabled)  { transform: scale(1.1) }
#send:active:not(:disabled) { transform: scale(.92) }
#send:disabled { opacity: .25; cursor: not-allowed }
#send svg { width: 13px; height: 13px }

/* scroll-to-bottom */
#scb {
  position: absolute;
  bottom: 84px;
  right: 20px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--s2);
  border: 1px solid var(--b2);
  color: var(--t2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 9;
  opacity: 0;
  pointer-events: none;
  transform: translateY(4px);
  transition: all .18s var(--e);
}
#scb.show { opacity:1; pointer-events:all; transform:none }
#scb:hover { color: var(--t1) }
#scb svg { width:13px; height:13px }

/* ── Settings overlay ───────────────────────────────────────────── */
.ov {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s var(--e);
}
.ov.open { opacity:1; pointer-events:all }

.pane {
  background: var(--s1);
  border: 1px solid var(--b2);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 20px 22px calc(28px + env(safe-area-inset-bottom, 0px));
  width: 100%;
  max-width: 720px;
  transform: translateY(100%);
  transition: transform .32s var(--es);
  max-height: 78dvh;
  overflow-y: auto;
}
.ov.open .pane { transform: none }

@media (min-width: 720px) {
  .pane { border-radius:18px; border-bottom:1px solid var(--b2); margin-bottom:20px }
}

.pane-grip {
  width: 32px; height: 3px;
  border-radius: 4px;
  background: var(--b2);
  margin: 0 auto 20px;
}

.pane-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--t1);
  font-family: var(--fm);
  margin-bottom: 20px;
}

.field { margin-bottom: 16px }
.f-label {
  font-size: 9.5px;
  font-family: var(--fm);
  color: var(--t3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.f-input, .f-ta {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 9px;
  padding: 10px 12px;
  font-family: var(--fm);
  font-size: 12px;
  color: var(--t1);
  outline: none;
  transition: border-color .15s var(--e);
}
.f-input:focus, .f-ta:focus { border-color: var(--b2) }
.f-ta { resize: vertical; min-height: 68px }

.seg {
  display: flex;
  gap: 5px;
  margin-bottom: 18px;
}
.sb {
  flex: 1;
  padding: 8px 6px;
  border-radius: 8px;
  border: 1px solid var(--b1);
  background: var(--s2);
  color: var(--t2);
  font-size: 11px;
  font-family: var(--fm);
  cursor: pointer;
  text-align: center;
  transition: all .15s var(--e);
}
.sb.on { background: var(--ac0); color: var(--ac); border-color: rgba(52,211,153,.2) }

[data-theme="light"] .sb.on {
  background: rgba(5,150,105,.08);
  color: var(--ac);
  border-color: rgba(5,150,105,.2);
}

.p-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}
.p-row-lbl { font-size: 13px; color: var(--t2) }

.tog {
  width: 38px; height: 21px;
  border-radius: 100px;
  background: var(--s3);
  border: 1px solid var(--b2);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: background .15s var(--e);
}
.tog.on { background: var(--ac); border-color: transparent }
.tog::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 15px; height: 15px;
  border-radius: 50%;
  background: #fff;
  transition: transform .15s var(--es);
}
.tog.on::after { transform: translateX(17px) }

.del-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: 7px;
  border: 1px solid var(--b1);
  background: transparent;
  color: var(--t3);
  font-size: 11.5px;
  font-family: var(--fm);
  cursor: pointer;
  transition: all .15s var(--e);
}
.del-btn:hover { color: #EF4444; border-color: rgba(239,68,68,.25); background: rgba(239,68,68,.06) }
.del-btn svg { width: 11px; height: 11px }

.apply {
  width: 100%;
  margin-top: 18px;
  padding: 12px;
  border-radius: 10px;
  background: var(--t1);
  color: var(--bg);
  border: none;
  font-family: var(--ff);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .02em;
  cursor: pointer;
  transition: opacity .15s var(--e);
}
.apply:hover { opacity: .85 }

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 480px) {
  header { padding: 0 16px }
  #msgs  { padding: 20px 16px 6px }
  #inp-wrap { padding: 10px 16px env(safe-area-inset-bottom, 14px) }
  .msg-body,.user-bubble { font-size: 14px }
  .user-bubble { max-width: 88% }
  .w-title { font-size: 20px }
  #scb { right: 16px }
}

.hidden { display: none !important }

</style>
</head>
<body>

<div id="shell">

  <header>
    <div class="h-status">
      <div class="dot" id="dot"></div>
      <span class="h-name">ORIN NX</span>
      <span class="h-status-text" id="stxt">ready</span>
    </div>
    <div class="h-actions">
      <button class="ib" id="tbtn" aria-label="Toggle theme">
        <svg id="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg id="i-moon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="ib" id="sbtn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="msgs">
    <div id="welcome">
      <div class="w-title">What can I help<br>you figure out?</div>
      <div class="w-sub">Edge inference agent on Jetson Orin NX. On-device, no cloud.</div>
      <div class="chips">
        <button class="chip" onclick="qsend('What is your inference speed?')">Inference speed</button>
        <button class="chip" onclick="qsend('What model are you running?')">Active model</button>
        <button class="chip" onclick="qsend('Run a system diagnostics')">Diagnostics</button>
        <button class="chip" onclick="qsend('Describe your capabilities')">Capabilities</button>
      </div>
    </div>
  </div>

  <button id="scb" aria-label="Scroll to bottom">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </button>

  <div id="inp-wrap">
    <div class="inp-row">
      <textarea id="inp" rows="1" placeholder="Ask anything…" aria-label="Message"></textarea>
      <button id="send" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Settings -->
<div class="ov" id="ov">
  <div class="pane" id="pane">
    <div class="pane-grip"></div>
    <div class="pane-title">SETTINGS</div>

    <div class="seg" id="mseg">
      <button class="sb on" data-mode="demo">demo</button>
      <button class="sb"    data-mode="websocket">ws</button>
      <button class="sb"    data-mode="rest">rest</button>
    </div>

    <div class="field">
      <div class="f-label">Endpoint</div>
      <input class="f-input" id="epinp" type="text" placeholder="ws://192.168.x.x:8765">
    </div>

    <div class="field">
      <div class="f-label">System Prompt</div>
      <textarea class="f-ta" id="spinp" placeholder="You are Orin NX…"></textarea>
    </div>

    <div class="p-row">
      <span class="p-row-lbl">Stream</span>
      <div class="tog on" id="stog"></div>
    </div>

    <div class="p-row">
      <button class="del-btn" id="clrbtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Clear chat
      </button>
    </div>

    <button class="apply" id="applybtn">Apply</button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
const S = {
  msgs: [], busy: false,
  mode: 'websocket', endpoint: '', stream: true,
  theme: 'dark', atBottom: true,
  sys: 'You are Orin NX, a sophisticated edge AI inference agent running on an NVIDIA Jetson Orin NX. You specialize in on-device ML inference, edge computing, and embedded systems. Be concise and technical.',
};

let di = 0;
const DR = [
  'Running **Llama-3.2-3B** at INT8 via TensorRT. Throughput: **~840 tok/s**. Power: 12.4 W nominal.',
  'System snapshot:\n```\nCPU  8× Cortex-A78AE  88% headroom\nGPU  1024-core Ampere  idle\nRAM  16 GB LPDDR5      3.9 GB used\nSTOR 64 GB eMMC        19 GB free\nTEMP 47 °C             nominal\n```',
  'P50 latency: **18 ms** · P95: **29 ms**. No thermal throttling in last 10k requests.',
  'Part of the **HiSLM** architecture. Low-confidence queries escalate to AGX Orin. I handle lightweight inference on-device.',
  'Active LoRA: `medical-v0.3`. Fine-tuned on clinical QA. Context: **8 192 tokens**. Quantization: INT8.',
  'Confidence routing threshold: 0.72. Queries below that escalate upstream. Adjustable via `/config`.',
  'Zero cloud dependency. Embeddings, tokenization, and inference run entirely on Ampere GPU cores. Cold-start: 340 ms. Warm: < 5 ms.',
];

// ── DOM ───────────────────────────────────────────────────────────
const msgsEl = document.getElementById('msgs');
const wEl    = document.getElementById('welcome');
const inpEl  = document.getElementById('inp');
const sendEl = document.getElementById('send');
const dotEl  = document.getElementById('dot');
const stxtEl = document.getElementById('stxt');
const scb    = document.getElementById('scb');
const ov     = document.getElementById('ov');
const epinp  = document.getElementById('epinp');
const spinp  = document.getElementById('spinp');
const stog   = document.getElementById('stog');
const mseg   = document.getElementById('mseg');

// ── Theme ─────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('onx-theme');
  S.theme = saved || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  applyTheme(S.theme);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('i-sun').classList.toggle('hidden', t !== 'dark');
  document.getElementById('i-moon').classList.toggle('hidden', t !== 'light');
}
document.getElementById('tbtn').onclick = () => {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  applyTheme(S.theme);
  localStorage.setItem('onx-theme', S.theme);
};

// ── Status ────────────────────────────────────────────────────────
function setStatus(s, txt) {
  dotEl.className = `dot${s==='on'?'':s==='wait'?' wait':' off'}`;
  stxtEl.textContent = txt;
}

// ── Input auto-resize ─────────────────────────────────────────────
inpEl.addEventListener('input', () => {
  inpEl.style.height = 'auto';
  inpEl.style.height = Math.min(inpEl.scrollHeight, 140) + 'px';
  sendEl.disabled = !inpEl.value.trim();
});
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendEl.disabled) send(); }
});
sendEl.onclick = send;

// ── Scroll ────────────────────────────────────────────────────────
msgsEl.addEventListener('scroll', () => {
  S.atBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 50;
  scb.classList.toggle('show', !S.atBottom && S.msgs.length > 0);
});
scb.onclick = scrollBottom;

function scrollBottom() {
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
}

// ── Helpers ───────────────────────────────────────────────────────
function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function md(raw) {
  let t = raw;
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_, _l, c)=>`<pre><code>${esc(c.trim())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  return t.split(/\n\n+/).map(p=>p.startsWith('<pre>')?p:`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

// ── Add message ───────────────────────────────────────────────────
function addMsg(role, content) {
  if (!wEl.classList.contains('hidden')) wEl.classList.add('hidden');
  S.msgs.push({ role, content, ts: new Date() });

  const el = document.createElement('div');
  el.className = `msg ${role}`;

  if (role === 'ai') {
    const tag = document.createElement('div');
    tag.className = 'msg-tag'; tag.textContent = 'NX';
    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = md(content);
    const time = document.createElement('div');
    time.className = 'msg-time'; time.textContent = nowTime();
    el.appendChild(tag); el.appendChild(body); el.appendChild(time);
  } else {
    const bub = document.createElement('div');
    bub.className = 'user-bubble';
    bub.innerHTML = `<p>${esc(content).replace(/\n/g,'<br>')}</p>`;
    const time = document.createElement('div');
    time.className = 'msg-time'; time.textContent = nowTime();
    time.style.marginTop = '4px';
    el.appendChild(bub); el.appendChild(time);
  }

  msgsEl.appendChild(el);
  if (S.atBottom) scrollBottom();
  return el;
}

// ── Typing ────────────────────────────────────────────────────────
function showTyping() {
  S.busy = true;
  const r = document.createElement('div');
  r.id = 'typing-row'; r.className = '';
  r.innerHTML = '<div class="t-tag">NX</div><div class="t-dots"><span class="t-dot"></span><span class="t-dot"></span><span class="t-dot"></span></div>';
  r.style.cssText = 'padding:14px 0;border-bottom:1px solid var(--b1);display:grid;grid-template-columns:28px 1fr;column-gap:12px;align-items:center;animation:msg-in .2s var(--e) both';
  msgsEl.appendChild(r);
  if (S.atBottom) scrollBottom();
}
function hideTyping() {
  S.busy = false;
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

// ── Send ──────────────────────────────────────────────────────────
async function send() {
  const txt = inpEl.value.trim();
  if (!txt || S.busy) return;
  inpEl.value = ''; inpEl.style.height = 'auto'; sendEl.disabled = true;
  addMsg('user', txt);
  await respond(txt);
}
function qsend(t) { inpEl.value = t; send(); }

async function respond(msg) {
  showTyping();
  setStatus('wait', 'processing…');
  try {
    if (S.mode === 'demo') {
      await new Promise(r => setTimeout(r, 480 + Math.random() * 640));
      hideTyping();
      addMsg('ai', DR[di++ % DR.length]);
    } else if (S.mode === 'websocket') {
      await wsCall(msg);
    } else {
      await restCall(msg);
    }
    setStatus('on', 'ready');
  } catch(e) {
    hideTyping();
    addMsg('ai', `⚠ ${e.message}`);
    setStatus('off', 'error');
  }
}

function wsCall(msg) {
  return new Promise((res, rej) => {
    if (!S.endpoint) { rej(new Error('No endpoint set')); return; }
    let buf='', done=false;
    const ws = new WebSocket(S.endpoint);
    ws.onopen = () => ws.send(JSON.stringify({type:'message',role:'user',content:msg,system:S.sys}));
    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type==='chunk') { buf+=d.content; }
        else if (d.type==='done'||d.type==='message') {
          if(d.content) buf=d.content; done=true;
          hideTyping(); addMsg('ai', buf||'—'); ws.close(); res();
        } else if(d.type==='error') { rej(new Error(d.message||'Error')); ws.close(); }
      } catch { buf+=e.data; }
    };
    ws.onerror = () => rej(new Error('WebSocket failed'));
    ws.onclose = () => { if(!done&&buf){hideTyping();addMsg('ai',buf);res();} };
    setTimeout(()=>{ if(!done){ws.close();done=true;hideTyping();buf?addMsg('ai',buf)&&res():rej(new Error('Timeout'));} },30000);
  });
}

async function restCall(msg) {
  if (!S.endpoint) throw new Error('No endpoint set');
  const r = await fetch(S.endpoint, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message:msg,messages:S.msgs.slice(-12).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content})),system:S.sys}),
    signal: AbortSignal.timeout(30000)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  hideTyping();
  addMsg('ai', d.content||d.message||d.response||d.text||JSON.stringify(d));
}

// ── Auto-connect to server ─────────────────────────────────────────
function autoConnect() {
  const host = location.hostname;
  const port = location.port || '8765';
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  S.mode = 'websocket';
  S.endpoint = `${proto}//${host}:${port}/ws`;
  document.querySelectorAll('.sb').forEach(b => b.classList.toggle('on', b.dataset.mode === S.mode));
}

// ── Settings ──────────────────────────────────────────────────────
document.getElementById('sbtn').onclick = openPane;
ov.addEventListener('click', e => { if(e.target===ov) closePane(); });

function openPane() {
  epinp.value = S.endpoint;
  spinp.value = S.sys;
  stog.className = `tog${S.stream?' on':''}`;
  document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('on', b.dataset.mode===S.mode));
  ov.classList.add('open');
}
function closePane() { ov.classList.remove('open'); }

mseg.addEventListener('click', e => {
  const b = e.target.closest('.sb'); if(!b) return;
  document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); S.mode = b.dataset.mode;
});

stog.onclick = () => { S.stream=!S.stream; stog.className=`tog${S.stream?' on':''}`; };

document.getElementById('applybtn').onclick = () => {
  S.endpoint = epinp.value.trim();
  if (spinp.value.trim()) S.sys = spinp.value.trim();
  saveSettings(); closePane();
};

document.getElementById('clrbtn').onclick = () => {
  S.msgs=[]; di=0; S.busy=false;
  msgsEl.querySelectorAll('.msg').forEach(e=>e.remove());
  const tr = document.getElementById('typing-row'); if(tr) tr.remove();
  wEl.classList.remove('hidden');
  setStatus('on','ready'); closePane();
};

// ── Persist ───────────────────────────────────────────────────────
function saveSettings() {
  localStorage.setItem('onx-cfg', JSON.stringify({mode:S.mode,endpoint:S.endpoint,sys:S.sys,stream:S.stream}));
}
function loadSettings() {
  try {
    const d = JSON.parse(localStorage.getItem('onx-cfg')||'{}');
    if(d.mode) S.mode=d.mode;
    if(d.endpoint) S.endpoint=d.endpoint;
    if(d.sys) S.sys=d.sys;
    if('stream' in d) S.stream=d.stream;
  } catch {}
}
window.addEventListener('beforeunload', saveSettings);

// ── Boot ──────────────────────────────────────────────────────────
initTheme(); autoConnect(); loadSettings(); setStatus('on','ready');
setTimeout(()=>inpEl.focus(), 200);
</script>
</body>
</html>
